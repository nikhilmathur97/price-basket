databases:
  - name: pricebasket-db
    databaseName: pricebasket_db
    user: pricebasket
    plan: free

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  - type: web
    name: pricebasket-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pricebasket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://pricebasket.in,https://www.pricebasket.in,https://dev.pricebasket.in,https://www.dev.pricebasket.in
      - key: SEED_SECRET
        value: pricebasket-seed-2024

  # ── Celery Worker ───────────────────────────────────────────────────────────
  - type: worker
    name: pricebasket-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: pricebasket-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: pricebasket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: pricebasket-redis
          property: connectionString

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: pricebasket-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
