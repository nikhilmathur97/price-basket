name: pricebasket
description: PriceBasket — Compare prices across 10 quick-commerce platforms
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # Navigation & State
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1

  # Firebase / Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Storage & Security
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Deep Links & URL
  app_links: ^6.1.1
  url_launcher: ^6.3.0

  # UI & UX
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
