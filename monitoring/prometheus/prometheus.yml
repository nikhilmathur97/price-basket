global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "pricebasket"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "pricebasket_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: "celery"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics
