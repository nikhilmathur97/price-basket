name: Deploy & SEO Auto-Submit

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

jobs:
  # ── Deploy Frontend to Vercel ──────────────────────────────────────────────
  # NOTE: Vercel also auto-deploys via its GitHub integration on every push to main.
  # This job is a redundant explicit deploy — skipped if VERCEL_TOKEN is not set.
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel credentials
        id: check-vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ Vercel secrets not configured — skipping explicit deploy (Vercel GitHub integration handles it)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-vercel.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        if: steps.check-vercel.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Set Vercel env vars (API_URL → AWS ALB)
        if: steps.check-vercel.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          ALB_URL="http://pricebasket-alb-72968209.ap-south-1.elb.amazonaws.com"
          # Remove then re-add (--force not supported in all CLI versions)
          vercel env rm API_URL production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
          echo "$ALB_URL" | vercel env add API_URL production --token=$VERCEL_TOKEN
          vercel env rm BACKEND_URL production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
          echo "$ALB_URL" | vercel env add BACKEND_URL production --token=$VERCEL_TOKEN
          echo "✅ Vercel env vars updated → $ALB_URL"

      - name: Deploy to Vercel
        if: steps.check-vercel.outputs.skip != 'true'
        id: deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

  # ── SEO: Submit sitemap to Google & Bing after deploy ─────────────────────
  seo-submit:
    name: Submit Sitemap to Search Engines
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Ping Google Sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://pricebasket.in/sitemap.xml")
          echo "Google ping status: $STATUS"

      - name: Ping Bing Sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bing.com/ping?sitemap=https://pricebasket.in/sitemap.xml")
          echo "Bing ping status: $STATUS"

      - name: Submit IndexNow (instant indexing for all key pages)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "⚠ INDEXNOW_KEY not set — skipping"
            exit 0
          fi
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"pricebasket.in\",
              \"key\": \"$INDEXNOW_KEY\",
              \"keyLocation\": \"https://pricebasket.in/indexnow\",
              \"urlList\": [
                \"https://pricebasket.in\",
                \"https://pricebasket.in/best-grocery-deals\",
                \"https://pricebasket.in/save-money-groceries\",
                \"https://pricebasket.in/compare/blinkit-vs-zepto\",
                \"https://pricebasket.in/compare/zepto-vs-instamart\",
                \"https://pricebasket.in/compare/blinkit-vs-bigbasket\",
                \"https://pricebasket.in/compare/zepto-vs-bigbasket\",
                \"https://pricebasket.in/compare/bigbasket-vs-jiomart\",
                \"https://pricebasket.in/compare/blinkit-vs-instamart\",
                \"https://pricebasket.in/compare/amazon-vs-blinkit\",
                \"https://pricebasket.in/compare/flipkart-vs-zepto\",
                \"https://pricebasket.in/grocery-prices-mumbai\",
                \"https://pricebasket.in/grocery-prices-delhi\",
                \"https://pricebasket.in/grocery-prices-bangalore\",
                \"https://pricebasket.in/grocery-prices-hyderabad\",
                \"https://pricebasket.in/grocery-prices-chennai\",
                \"https://pricebasket.in/grocery-prices-pune\",
                \"https://pricebasket.in/cheapest-atta-online\",
                \"https://pricebasket.in/cheapest-milk-online\",
                \"https://pricebasket.in/cheapest-oil-online\",
                \"https://pricebasket.in/blog\"
              ]
            }"
          echo "✅ IndexNow submitted (21 URLs)"

      - name: Notify Telegram on Deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHANNEL_ID" ]; then
            echo "ℹ Telegram not configured — skipping"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHANNEL_ID" \
            -d "text=🚀 PriceBasket deployed successfully!%0A%0ANew features live at pricebasket.in" \
            -d "parse_mode=HTML"
          echo "✅ Telegram notified"

  # ── Lighthouse SEO audit after deploy ─────────────────────────────────────
  lighthouse-audit:
    name: Lighthouse SEO Audit
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        continue-on-error: true  # don't fail deploy on audit issues
        with:
          urls: |
            https://pricebasket.in
            https://pricebasket.in/best-grocery-deals
            https://pricebasket.in/compare/blinkit-vs-zepto
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
