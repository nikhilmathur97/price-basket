name: Deploy Price Basket

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  # 1. Auto-deploy: only when code is merged/pushed to main
  push:
    branches:
      - main
      - dev

  # 2. Manual deploy: trigger from GitHub Actions console
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - dev
          - feature/price-basket
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      skip_backend:
        description: "Skip backend deployment?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Resolve branch & env ───────────────────────────────────────────────────────
env:
  DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
  # Auto-detect: main branch → production, dev branch → preview
  DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'preview') }}
  SKIP_BACKEND: ${{ github.event.inputs.skip_backend || 'false' }}

jobs:
  # ── 1. Deploy Next.js Frontend → Vercel ──────────────────────────────────────
  deploy-frontend:
    name: "Deploy Frontend → Vercel (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production') || 'preview' }})"
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
      deploy_env: ${{ steps.resolve_env.outputs.deploy_env }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve deploy environment
        id: resolve_env
        run: |
          BRANCH="${{ env.DEPLOY_BRANCH }}"
          ENV="${{ env.DEPLOY_ENV }}"
          echo "Branch: $BRANCH, Env: $ENV"
          echo "deploy_env=$ENV" >> $GITHUB_OUTPUT

      - name: Pull Vercel environment
        working-directory: frontend
        run: |
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        working-directory: frontend
        run: |
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: https://pricebasket-api.onrender.com

      - name: Deploy to Vercel
        id: deploy
        working-directory: frontend
        run: |
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "Deployed to: $DEPLOYMENT_URL"
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Pin dev.pricebasket.in to the latest preview deployment
      - name: Alias dev.pricebasket.in → preview deployment
        if: env.DEPLOY_ENV == 'preview'
        working-directory: frontend
        run: |
          vercel alias set ${{ steps.deploy.outputs.deployment_url }} dev.pricebasket.in \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 2. Deploy FastAPI Backend → Server via SSH ────────────────────────────────
  deploy-backend:
    name: "Deploy Backend → Server (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production') || 'preview' }})"
    runs-on: ubuntu-latest
    needs: deploy-frontend
    # Only SSH-deploy backend on production pushes (Render handles it via render.yaml)
    if: ${{ github.event.inputs.skip_backend != 'true' && needs.deploy-frontend.outputs.deploy_env == 'production' }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Check server secrets are configured
        id: check_server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$SERVER_HOST" ]; then
            echo "⚠️  SERVER_HOST secret is not set — skipping backend deployment."
            echo "   Add it at: github.com/nikhilmathur97/price-basket/settings/secrets/actions"
            echo "has_server=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Server secrets found — proceeding with SSH deploy"
            echo "has_server=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check_server.outputs.has_server == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/price-basket

            git fetch --all
            git checkout ${{ env.DEPLOY_BRANCH }}
            git pull origin ${{ env.DEPLOY_BRANCH }}

            source backend/.venv/bin/activate
            pip install -q -r backend/requirements.txt

            cd backend && alembic upgrade head && cd ..

            pm2 restart pricebasket-api || pm2 start \
              "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2" \
              --name pricebasket-api \
              --cwd /opt/price-basket/backend \
              --interpreter /opt/price-basket/backend/.venv/bin/python

            pm2 restart pricebasket-worker || pm2 start \
              "celery -A app.workers.celery_app worker --loglevel=info --concurrency=2" \
              --name pricebasket-worker \
              --cwd /opt/price-basket/backend \
              --interpreter /opt/price-basket/backend/.venv/bin/python

            pm2 save
            echo "✅ Backend deployed from branch: ${{ env.DEPLOY_BRANCH }}"
