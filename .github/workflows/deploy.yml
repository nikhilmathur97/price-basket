name: Deploy Price Basket

#   dev  branch  →  Auto-deploy  →  dev.pricebasket.in  (on every push)
#   main branch  →  Manual only  →  pricebasket.in + Render backend
#
#   To deploy to production:
#     1. Go to Actions → "Deploy Price Basket" → "Run workflow"
#     2. Select branch: main
#     3. Click "Run workflow"

on:
  push:
    branches:
      - dev          # ← only dev auto-deploys on push
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (use 'main' for production)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - main

env:
  DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}

jobs:
  deploy-frontend:
    name: "Frontend → Vercel (${{ github.event.inputs.branch || github.ref_name }})"
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Project: "frontend" (prj_uOOCdYAaTxLylSpOLA0mQTrPAQig) — mapped to pricebasket.in
      # rootDirectory: "frontend" is set in Vercel dashboard, so CLI runs from repo root.

      # ── PRODUCTION (main → pricebasket.in) ──────────────────────────────────
      - name: "[PROD] Pull Vercel env"
        if: env.DEPLOY_BRANCH == 'main'
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig

      - name: "[PROD] Build"
        if: env.DEPLOY_BRANCH == 'main'
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.PROD_WS_URL }}

      - name: "[PROD] Deploy → pricebasket.in"
        if: env.DEPLOY_BRANCH == 'main'
        id: deploy-prod
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Production: $URL"
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig

      # ── DEV (dev → dev.pricebasket.in) ──────────────────────────────────────
      - name: "[DEV] Pull Vercel env"
        if: env.DEPLOY_BRANCH == 'dev'
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig

      - name: "[DEV] Build"
        if: env.DEPLOY_BRANCH == 'dev'
        working-directory: frontend
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig
          NEXT_PUBLIC_API_URL: ${{ secrets.DEV_API_URL || secrets.PROD_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.DEV_WS_URL || secrets.PROD_WS_URL }}

      - name: "[DEV] Deploy → dev.pricebasket.in"
        if: env.DEPLOY_BRANCH == 'dev'
        id: deploy-dev
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          vercel alias set "$URL" dev.pricebasket.in \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=team_KHLA60LqPLQzMO93fpdeNGmb
          echo "✅ Dev: $URL → dev.pricebasket.in"
        env:
          VERCEL_ORG_ID: team_KHLA60LqPLQzMO93fpdeNGmb
          VERCEL_PROJECT_ID: prj_uOOCdYAaTxLylSpOLA0mQTrPAQig

      - name: Set unified URL output
        id: set-url
        run: |
          echo "url=${{ steps.deploy-prod.outputs.url || steps.deploy-dev.outputs.url }}" >> $GITHUB_OUTPUT

  deploy-backend:
    name: "Backend → Render (main only)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.branch == 'main' }}
    outputs:
      deployed: ${{ steps.trigger.outputs.deployed }}

    steps:
      - name: "[PROD] Trigger Render deploy"
        id: trigger
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy trigger"
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            echo "🚀 Triggering Render backend deploy..."
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
            echo "Render deploy hook response: $HTTP"
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

      - name: "[PROD] Wait for Render deploy + call fix-electronics + mark-featured"
        if: steps.trigger.outputs.deployed == 'true'
        run: |
          echo "⏳ Waiting 3 minutes for Render to finish deploying..."
          sleep 180
          echo "🔍 Checking if Render backend is up..."
          for i in 1 2 3 4 5 6 7 8; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              https://pricebasket-api.onrender.com/health)
            echo "  Health check attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ Backend is up!"
              break
            fi
            sleep 30
          done

          echo "🔧 Running fix-electronics migration..."
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              https://pricebasket-api.onrender.com/api/v1/setup/fix-electronics \
              -H "x-seed-key: pricebasket-seed-2024")
            echo "  fix-electronics attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ fix-electronics succeeded!"
              break
            fi
            sleep 30
          done

          echo "🔍 Running mark-featured..."
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              https://pricebasket-api.onrender.com/api/v1/setup/mark-featured \
              -H "x-seed-key: pricebasket-seed-2024")
            echo "  mark-featured attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ mark-featured succeeded!"
              break
            fi
            sleep 30
          done

  summary:
    name: "Deployment summary"
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Write summary
        run: |
          BRANCH="${{ env.DEPLOY_BRANCH }}"
          URL="${{ needs.deploy-frontend.outputs.deployment_url }}"
          if [ "$BRANCH" = "main" ]; then
            echo "### ✅ Production deployed → pricebasket.in" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Dev deployed → dev.pricebasket.in"    >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Branch : \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL    : $URL"        >> $GITHUB_STEP_SUMMARY
          if [ "$BRANCH" = "main" ]; then
            echo "- Backend: Render deploy triggered ✅"       >> $GITHUB_STEP_SUMMARY
          fi
