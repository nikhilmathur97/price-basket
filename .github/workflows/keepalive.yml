name: Backend Keepalive

# Pings the Render backend every 14 minutes so it never sleeps.
# Render free tier spins down after 15 min of inactivity — this prevents that.

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes, 24/7
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  ping:
    name: Ping backend /health
    runs-on: ubuntu-latest
    steps:
      - name: Ping pricebasket-api on Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://pricebasket-api.onrender.com/health)
          echo "Backend responded: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend returned $STATUS — may be starting up or down"
          fi
