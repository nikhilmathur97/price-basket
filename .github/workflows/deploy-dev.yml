name: "1. Deploy → dev.pricebasket.in"

# Runs automatically on every push to the dev branch.
# Deploys backend to EC2 + frontend to dev.pricebasket.in
#
# Required GitHub Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  — Vercel deploy
#   EC2_HOST     — EC2 public IP or hostname
#   EC2_USER     — EC2 SSH username ("ec2-user" for Amazon Linux)
#   EC2_SSH_KEY  — EC2 private SSH key (PEM contents of github-actions deploy key)
#   EC2_SG_ID    — EC2 Security Group ID (e.g. sg-0abc123) for dynamic port-22 whitelisting
#   AWS_ROLE_ARN — IAM role ARN for OIDC (needed for SG open/close); optional if EC2_SG_ID not set

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. Backend → EC2 ────────────────────────────────────────────────────────
  deploy-backend:
    name: "Backend → EC2"
    runs-on: ubuntu-latest
    steps:
      - name: Check EC2 secrets
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ EC2_HOST / EC2_SSH_KEY not set — skipping backend deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check SG secret
        id: check_sg
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -z "${{ secrets.EC2_SG_ID }}" ] || [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "skip_sg=true" >> $GITHUB_OUTPUT
            echo "⚠ EC2_SG_ID / AWS_ROLE_ARN not set — skipping dynamic SG management"
          else
            echo "skip_sg=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.check.outputs.skip != 'true' && steps.check_sg.outputs.skip_sg != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Open port 22 for this runner's IP
        if: steps.check.outputs.skip != 'true' && steps.check_sg.outputs.skip_sg != 'true'
        id: open_sg
        continue-on-error: true
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          # Get this runner's public IP
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          # Add SSH inbound rule — ignore error if rule already exists
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --region ap-south-1 2>/dev/null || echo "Rule already exists or skipped"
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "✅ Port 22 opened for $RUNNER_IP"

      - name: SSH → pull latest dev + sync SMTP from SSM + restart
        if: steps.check.outputs.skip != 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER != '' && secrets.EC2_USER || 'ec2-user' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Write key to temp file
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Resolve EC2_USER — default to ec2-user if secret is empty
          RESOLVED_USER="${EC2_USER:-ec2-user}"

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            "${RESOLVED_USER}@${EC2_HOST}" << 'ENDSSH'
          set -e
          cd /opt/pricebasket
          git fetch origin
          git checkout dev
          git pull origin dev
          pip3 install -r backend/requirements.txt -q

          # Sync SMTP config from SSM (if available)
          if command -v aws &>/dev/null; then
            SMTP_HOST=$(aws ssm get-parameter --name /pricebasket/smtp/host     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PORT=$(aws ssm get-parameter --name /pricebasket/smtp/port     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_USER=$(aws ssm get-parameter --name /pricebasket/smtp/user     --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PASS=$(aws ssm get-parameter --name /pricebasket/smtp/password --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_FROM=$(aws ssm get-parameter --name /pricebasket/smtp/from     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            if [ -n "$SMTP_HOST" ]; then
              grep -v "^SMTP_" backend/.env > /tmp/env_clean
              { echo "SMTP_HOST=$SMTP_HOST"; echo "SMTP_PORT=$SMTP_PORT"; echo "SMTP_USER=$SMTP_USER"; echo "SMTP_PASSWORD=$SMTP_PASS"; echo "SMTP_FROM=$SMTP_FROM"; } >> /tmp/env_clean
              mv /tmp/env_clean backend/.env
              echo "✅ SMTP synced from SSM"
            fi
          fi

          sudo systemctl restart pricebasket-api.service
          echo "✅ Backend deployed and restarted"
          ENDSSH
          rm -f /tmp/deploy_key

      - name: Revoke port 22 for this runner's IP
        if: always() && steps.check.outputs.skip != 'true' && steps.check_sg.outputs.skip_sg != 'true'
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          # Use the IP captured in the open step output (more reliable than env var)
          RUNNER_IP="${{ steps.open_sg.outputs.runner_ip }}"
          # Fallback to env var if step output not available
          if [ -z "$RUNNER_IP" ]; then
            RUNNER_IP="${{ env.RUNNER_IP }}"
          fi
          if [ -n "$RUNNER_IP" ] && [ -n "$EC2_SG_ID" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "$EC2_SG_ID" \
              --protocol tcp \
              --port 22 \
              --cidr "${RUNNER_IP}/32" \
              --region ap-south-1 2>/dev/null || true
            echo "✅ Port 22 revoked for $RUNNER_IP"
          else
            echo "⚠ No RUNNER_IP or EC2_SG_ID — nothing to revoke"
          fi

  # ── 2. Frontend → dev.pricebasket.in ────────────────────────────────────────
  deploy-frontend:
    name: "Frontend → dev.pricebasket.in"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (preview)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy → dev.pricebasket.in
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "✅ Deployed preview: $URL"
          # Explicitly assign this deployment to dev.pricebasket.in
          # (Vercel CLI can't detect the dev branch in CI detached-HEAD mode)
          vercel alias set "$URL" dev.pricebasket.in --token=$VERCEL_TOKEN
          echo "🌐 Live at: https://dev.pricebasket.in"
