name: "1. Deploy ŌåÆ dev.pricebasket.in"

# Runs automatically on every push to the dev branch.
# Deploys backend to EC2 + frontend to dev.pricebasket.in
#
# Required GitHub Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  ŌĆö Vercel deploy
#   EC2_HOST     ŌĆö EC2 public IP or hostname
#   EC2_USER     ŌĆö EC2 SSH username ("ec2-user" for Amazon Linux)
#   EC2_SSH_KEY  ŌĆö EC2 private SSH key (PEM contents of github-actions deploy key)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ŌöĆŌöĆ 1. Backend ŌåÆ EC2 ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  deploy-backend:
    name: "Backend ŌåÆ EC2"
    runs-on: ubuntu-latest
    steps:
      - name: Check EC2 secrets
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "ŌÜĀ EC2_HOST / EC2_SSH_KEY not set ŌĆö skipping backend deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1
        continue-on-error: true

      - name: SSH ŌåÆ pull latest dev + sync SMTP from SSM + restart
        if: steps.check.outputs.skip != 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Write key to temp file
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            "${EC2_USER}@${EC2_HOST}" << 'ENDSSH'
          set -e
          cd /opt/pricebasket
          git fetch origin
          git checkout dev
          git pull origin dev
          pip3 install -r backend/requirements.txt -q

          # Sync SMTP config from SSM (if available)
          if command -v aws &>/dev/null; then
            SMTP_HOST=$(aws ssm get-parameter --name /pricebasket/smtp/host     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PORT=$(aws ssm get-parameter --name /pricebasket/smtp/port     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_USER=$(aws ssm get-parameter --name /pricebasket/smtp/user     --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PASS=$(aws ssm get-parameter --name /pricebasket/smtp/password --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_FROM=$(aws ssm get-parameter --name /pricebasket/smtp/from     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            if [ -n "$SMTP_HOST" ]; then
              grep -v "^SMTP_" backend/.env > /tmp/env_clean
              { echo "SMTP_HOST=$SMTP_HOST"; echo "SMTP_PORT=$SMTP_PORT"; echo "SMTP_USER=$SMTP_USER"; echo "SMTP_PASSWORD=$SMTP_PASS"; echo "SMTP_FROM=$SMTP_FROM"; } >> /tmp/env_clean
              mv /tmp/env_clean backend/.env
              echo "Ō£ģ SMTP synced from SSM"
            fi
          fi

          sudo systemctl restart pricebasket-api.service
          echo "Ō£ģ Backend deployed and restarted"
          ENDSSH
          rm -f /tmp/deploy_key

  # ŌöĆŌöĆ 2. Frontend ŌåÆ dev.pricebasket.in ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  deploy-frontend:
    name: "Frontend ŌåÆ dev.pricebasket.in"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy ŌåÆ dev.pricebasket.in
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "Ō£ģ Deployed preview: $URL"
          # Explicitly assign this deployment to dev.pricebasket.in
          # (Vercel CLI can't detect the dev branch in CI detached-HEAD mode)
          vercel alias set "$URL" dev.pricebasket.in --token=$VERCEL_TOKEN
          echo "­¤īÉ Live at: https://dev.pricebasket.in"
