name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "443414059511"

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: 443414059511.dkr.ecr.ap-south-1.amazonaws.com
          ECR_REPOSITORY: pricebasket-api
          IMAGE_TAG: dev
        run: |
          docker build -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:dev-${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:dev-${{ github.sha }}

      - name: Register new ECS task definition (Dev)
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://aws/task-def-api-dev.json \
            --region ap-south-1

      - name: Create dev ECS service if it does not exist
        run: |
          # Check if service exists; create it if not
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster pricebasket-cluster \
            --services pricebasket-api-dev \
            --region ap-south-1 \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "Dev service already exists — updating"
            aws ecs update-service \
              --cluster pricebasket-cluster \
              --service pricebasket-api-dev \
              --task-definition pricebasket-api-dev \
              --force-new-deployment \
              --region ap-south-1
          else
            echo "Dev service does not exist — creating"
            # Get the latest task definition ARN
            TASK_DEF_ARN=$(aws ecs describe-task-definition \
              --task-definition pricebasket-api-dev \
              --region ap-south-1 \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            # Get subnet and security group from the prod service
            PROD_SVC=$(aws ecs describe-services \
              --cluster pricebasket-cluster \
              --services pricebasket-api \
              --region ap-south-1 \
              --query 'services[0].networkConfiguration.awsvpcConfiguration' \
              --output json)

            SUBNETS=$(echo $PROD_SVC | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(d['subnets']))")
            SGS=$(echo $PROD_SVC | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(d['securityGroups']))")
            TG_ARN=$(aws ecs describe-services \
              --cluster pricebasket-cluster \
              --services pricebasket-api \
              --region ap-south-1 \
              --query 'services[0].loadBalancers[0].targetGroupArn' \
              --output text)

            aws ecs create-service \
              --cluster pricebasket-cluster \
              --service-name pricebasket-api-dev \
              --task-definition pricebasket-api-dev \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SGS],assignPublicIp=DISABLED}" \
              --region ap-south-1
          fi

  deploy-frontend:
    name: Deploy Frontend Preview (Dev)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend/
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend/
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend/
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
