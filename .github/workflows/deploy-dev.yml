name: "1. Deploy → dev.pricebasket.in"

# Runs automatically on every push to the dev branch.
# Deploys backend to EC2 (SSH) + frontend to dev.pricebasket.in (Vercel)
#
# Required GitHub Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  — Vercel deploy
#   EC2_HOST     — EC2 public IP or hostname
#   EC2_USER     — EC2 SSH username ("ec2-user" for Amazon Linux)
#   EC2_SSH_KEY  — EC2 private SSH key (PEM contents of github-actions deploy key)
#
# Note: EC2 Security Group must allow port 22 inbound from 0.0.0.0/0 (or GitHub Actions IPs)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Backend → EC2 ────────────────────────────────────────────────────────
  deploy-backend:
    name: "Backend → EC2"
    runs-on: ubuntu-latest
    # Never block the frontend deploy if EC2 SSH is unreachable
    continue-on-error: true
    steps:
      - name: Check EC2 secrets
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ EC2_HOST / EC2_SSH_KEY not set — skipping backend deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: SSH → pull latest dev + sync SMTP from SSM + restart
        if: steps.check.outputs.skip != 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER_SECRET: ${{ secrets.EC2_USER }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Default to ec2-user if secret is empty
          RESOLVED_USER="${EC2_USER_SECRET:-ec2-user}"
          if [ -z "$RESOLVED_USER" ]; then
            RESOLVED_USER="ec2-user"
          fi

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${RESOLVED_USER}@${EC2_HOST}" 'bash -s' << 'ENDSSH'
          set -e
          cd /opt/pricebasket
          git fetch origin
          git checkout dev
          git pull origin dev
          pip3 install -r backend/requirements.txt -q

          # Sync SMTP config from SSM (if available)
          if command -v aws &>/dev/null; then
            SMTP_HOST=$(aws ssm get-parameter --name /pricebasket/smtp/host     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PORT=$(aws ssm get-parameter --name /pricebasket/smtp/port     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_USER=$(aws ssm get-parameter --name /pricebasket/smtp/user     --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_PASS=$(aws ssm get-parameter --name /pricebasket/smtp/password --with-decryption --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            SMTP_FROM=$(aws ssm get-parameter --name /pricebasket/smtp/from     --region ap-south-1 --query Parameter.Value --output text 2>/dev/null) || true
            if [ -n "$SMTP_HOST" ]; then
              grep -v "^SMTP_" backend/.env > /tmp/env_clean
              { echo "SMTP_HOST=$SMTP_HOST"; echo "SMTP_PORT=$SMTP_PORT"; echo "SMTP_USER=$SMTP_USER"; echo "SMTP_PASSWORD=$SMTP_PASS"; echo "SMTP_FROM=$SMTP_FROM"; } >> /tmp/env_clean
              mv /tmp/env_clean backend/.env
              echo "✅ SMTP synced from SSM"
            fi
          fi

          sudo systemctl restart pricebasket-api.service
          echo "✅ Backend deployed and restarted"
          ENDSSH
          rm -f /tmp/deploy_key

  # ── 2. Frontend → dev.pricebasket.in ────────────────────────────────────────
  deploy-frontend:
    name: "Frontend → dev.pricebasket.in"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Configure Vercel project settings + env vars via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # 1. Clear rootDirectory + set nodeVersion 20.x
          curl -sf -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null, "nodeVersion": "20.x"}' \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d); console.log('rootDirectory:', j.rootDirectory ?? 'null', '| nodeVersion:', j.nodeVersion ?? 'default');" \
            || echo "⚠ project patch failed — continuing anyway"

          # 2. Upsert API_URL env var for all environments (preview + production)
          #    First delete existing, then create fresh to avoid duplicate errors
          for ENV_TARGET in preview production; do
            # Delete old value (ignore errors if not found)
            EXISTING_ID=$(curl -sf \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const envs=JSON.parse(d).envs||[]; const e=envs.find(x=>x.key==='API_URL'&&x.target&&x.target.includes('${ENV_TARGET}')); console.log(e?e.id:'');" 2>/dev/null) || true
            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X DELETE \
                "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env/${EXISTING_ID}?teamId=${VERCEL_ORG_ID}" \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null || true
              echo "Deleted old API_URL for $ENV_TARGET (id=$EXISTING_ID)"
            fi
            # Create new value
            curl -sf -X POST \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"API_URL\",\"value\":\"http://pricebasket-alb-72968209.ap-south-1.elb.amazonaws.com\",\"type\":\"plain\",\"target\":[\"${ENV_TARGET}\"]}" \
              | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d); console.log('Set API_URL for ${ENV_TARGET}:', j.key||JSON.stringify(j));" \
              || echo "⚠ API_URL set for ${ENV_TARGET} failed — continuing"
          done

      - name: Pull Vercel project settings (preview)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy → dev.pricebasket.in
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # --archive=tgz bundles all files into one tarball upload (avoids 5000-file free-tier limit)
          # Capture full output, then extract the clean https://...vercel.app URL (strip any trailing text)
          DEPLOY_OUT=$(vercel deploy --prebuilt --archive=tgz --token=$VERCEL_TOKEN 2>&1)
          echo "$DEPLOY_OUT"
          URL=$(echo "$DEPLOY_OUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          if [ -z "$URL" ]; then
            echo "❌ Could not extract deployment URL from vercel output above"
            exit 1
          fi
          echo "✅ Deployed preview: $URL"
          # Explicitly assign this deployment to dev.pricebasket.in
          # (Vercel CLI can't detect the dev branch in CI detached-HEAD mode)
          vercel alias set "$URL" dev.pricebasket.in --token=$VERCEL_TOKEN
          echo "🌐 Live at: https://dev.pricebasket.in"
