name: "1. Deploy → dev.pricebasket.in"

# Runs automatically on every push to the dev branch.
# Deploys backend to ECS Fargate + frontend to dev.pricebasket.in
#
# Required GitHub Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID  — Vercel deploy
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY         — ECS deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Backend → ECS Fargate ─────────────────────────────────────────────────
  deploy-backend:
    name: "Backend → ECS Fargate"
    runs-on: ubuntu-latest
    steps:
      - name: Check AWS secrets
        id: check
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY not set — skipping backend deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        if: steps.check.outputs.skip != 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Build, tag & push Docker image to ECR
        if: steps.check.outputs.skip != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: pricebasket-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Force ECS service redeploy (rolling update)
        if: steps.check.outputs.skip != 'true'
        run: |
          aws ecs update-service \
            --cluster pricebasket-dev \
            --service pricebasket-api \
            --force-new-deployment \
            --region ap-south-1
          echo "✅ ECS rolling deploy triggered"

  # ── 2. Frontend → dev.pricebasket.in ────────────────────────────────────────
  deploy-frontend:
    name: "Frontend → dev.pricebasket.in"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Clear Vercel project rootDirectory via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # The Vercel project has rootDirectory="frontend" set on vercel.com.
          # Running vercel build/deploy from inside frontend/ doubles it to frontend/frontend/.
          # Patch it to empty string via the Vercel API so CLI uses "." (current dir).
          curl -sf -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null}' \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d); console.log('rootDirectory now:', j.rootDirectory ?? 'null (cleared)');" \
            || echo "⚠ API patch failed — continuing anyway"

      - name: Pull Vercel project settings (preview)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy → dev.pricebasket.in
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # --archive=tgz bundles all files into one tarball upload (avoids 5000-file free-tier limit)
          URL=$(vercel deploy --prebuilt --archive=tgz --token=$VERCEL_TOKEN)
          echo "✅ Deployed preview: $URL"
          # Explicitly assign this deployment to dev.pricebasket.in
          # (Vercel CLI can't detect the dev branch in CI detached-HEAD mode)
          vercel alias set "$URL" dev.pricebasket.in --token=$VERCEL_TOKEN
          echo "🌐 Live at: https://dev.pricebasket.in"
