name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "443414059511"

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: 443414059511.dkr.ecr.ap-south-1.amazonaws.com
          ECR_REPOSITORY: pricebasket-api
          IMAGE_TAG: latest
        run: |
          docker build -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:prod-${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-${{ github.sha }}

      - name: Force new ECS deployment (Prod)
        run: |
          aws ecs update-service \
            --cluster pricebasket-cluster \
            --service pricebasket-api-prod \
            --force-new-deployment \
            --region ap-south-1

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster pricebasket-cluster \
            --services pricebasket-api-prod \
            --region ap-south-1

      # Vercel automatically deploys on push to main branch via its GitHub integration.
      # No explicit Vercel deploy step is needed here — Vercel detects the push and
      # triggers a production deployment automatically.
