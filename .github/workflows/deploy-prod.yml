name: "2. Promote dev → Production (pricebasket.in)"

# MANUAL TRIGGER ONLY — run this after you have tested on dev.pricebasket.in
#
# What this does:
#   1. Merges dev branch into main
#   2. Deploys frontend to pricebasket.in (Vercel production)
#   3. Submits sitemap to Google / Bing / IndexNow
#   4. Notifies Telegram
#   5. Runs Lighthouse SEO audit
#
# Required GitHub Secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   GH_PAT                — Personal Access Token with repo + workflow scopes
#                           (GITHUB_TOKEN cannot push workflow file changes)
#   INDEXNOW_KEY          — for instant indexing (optional)
#   TELEGRAM_BOT_TOKEN    — for deploy notification (optional)
#   TELEGRAM_CHANNEL_ID   — for deploy notification (optional)

on:
  workflow_dispatch:

jobs:
  # ── 1. Merge dev → main ─────────────────────────────────────────────────────
  merge-to-main:
    name: "Merge dev → main"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check GH_PAT secret
        id: check_pat
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "❌ GH_PAT secret is not set. A Personal Access Token with repo + workflow scopes is required to push workflow file changes."
            exit 1
          fi
          echo "✅ GH_PAT is set"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT needs repo + workflow scopes (GITHUB_TOKEN can't push workflow files)
          token: ${{ secrets.GH_PAT }}

      - name: Merge dev into main
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicitly use PAT in remote URL so workflow files can be pushed
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          git checkout main
          git merge origin/dev --no-edit
          git push origin main
          echo "✅ dev merged into main"

  # ── 2. Deploy frontend → pricebasket.in ─────────────────────────────────────
  deploy-frontend:
    name: "Frontend → pricebasket.in"
    runs-on: ubuntu-latest
    needs: merge-to-main
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Clear Vercel project rootDirectory via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # The Vercel project has rootDirectory="frontend" set on vercel.com.
          # Running vercel build/deploy from inside frontend/ doubles it to frontend/frontend/.
          # Patch it to null via the Vercel API so CLI uses "." (current dir).
          curl -sf -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null}' \
            | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d); console.log('rootDirectory now:', j.rootDirectory ?? 'null (cleared)');" \
            || echo "⚠ API patch failed — continuing anyway"

      - name: Pull Vercel project settings (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy → pricebasket.in
        id: deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # --archive=tgz bundles all files into one tarball upload (avoids 5000-file free-tier limit)
          URL=$(vercel deploy --prebuilt --prod --archive=tgz --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Production deployed: $URL"
          echo "🌐 Live at: https://pricebasket.in"

  # ── 3. SEO submissions ───────────────────────────────────────────────────────
  seo-submit:
    name: "SEO Submit"
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Ping Google Sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://pricebasket.in/sitemap.xml")
          echo "Google ping: HTTP $STATUS"

      - name: Ping Bing Sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bing.com/ping?sitemap=https://pricebasket.in/sitemap.xml")
          echo "Bing ping: HTTP $STATUS"

      - name: Submit IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "⚠ INDEXNOW_KEY not set — skipping"
            exit 0
          fi
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"pricebasket.in\",
              \"key\": \"$INDEXNOW_KEY\",
              \"keyLocation\": \"https://pricebasket.in/indexnow\",
              \"urlList\": [
                \"https://pricebasket.in\",
                \"https://pricebasket.in/best-grocery-deals\",
                \"https://pricebasket.in/save-money-groceries\",
                \"https://pricebasket.in/compare/blinkit-vs-zepto\",
                \"https://pricebasket.in/compare/zepto-vs-instamart\",
                \"https://pricebasket.in/compare/blinkit-vs-bigbasket\",
                \"https://pricebasket.in/compare/zepto-vs-bigbasket\",
                \"https://pricebasket.in/compare/bigbasket-vs-jiomart\",
                \"https://pricebasket.in/compare/blinkit-vs-instamart\",
                \"https://pricebasket.in/compare/amazon-vs-blinkit\",
                \"https://pricebasket.in/compare/flipkart-vs-zepto\",
                \"https://pricebasket.in/grocery-prices-mumbai\",
                \"https://pricebasket.in/grocery-prices-delhi\",
                \"https://pricebasket.in/grocery-prices-bangalore\",
                \"https://pricebasket.in/grocery-prices-hyderabad\",
                \"https://pricebasket.in/grocery-prices-chennai\",
                \"https://pricebasket.in/grocery-prices-pune\",
                \"https://pricebasket.in/cheapest-atta-online\",
                \"https://pricebasket.in/cheapest-milk-online\",
                \"https://pricebasket.in/cheapest-oil-online\",
                \"https://pricebasket.in/blog\"
              ]
            }"
          echo "✅ IndexNow submitted (21 URLs)"

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHANNEL_ID" ]; then
            echo "ℹ Telegram not configured — skipping"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHANNEL_ID" \
            -d "text=🚀 PriceBasket deployed to production!%0A%0ALive at https://pricebasket.in" \
            -d "parse_mode=HTML"
          echo "✅ Telegram notified"

  # ── 4. Lighthouse SEO audit ──────────────────────────────────────────────────
  lighthouse-audit:
    name: "Lighthouse SEO Audit"
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        continue-on-error: true
        with:
          urls: |
            https://pricebasket.in
            https://pricebasket.in/best-grocery-deals
            https://pricebasket.in/compare/blinkit-vs-zepto
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
