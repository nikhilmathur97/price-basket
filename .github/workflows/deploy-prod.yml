name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AWS credentials
        id: check-aws
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ AWS credentials not configured — skipping backend deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check-aws.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        if: steps.check-aws.outputs.skip != 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "443414059511"

      - name: Build, tag, and push Docker image to ECR
        if: steps.check-aws.outputs.skip != 'true'
        env:
          ECR_REGISTRY: 443414059511.dkr.ecr.ap-south-1.amazonaws.com
          ECR_REPOSITORY: pricebasket-api
          IMAGE_TAG: latest
        run: |
          docker build -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:prod-${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-${{ github.sha }}

      - name: Register new ECS task definition (Prod)
        if: steps.check-aws.outputs.skip != 'true'
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://aws/task-def-api.json \
            --region ap-south-1

      - name: Force new ECS deployment (Prod)
        if: steps.check-aws.outputs.skip != 'true'
        run: |
          aws ecs update-service \
            --cluster pricebasket-cluster \
            --service pricebasket-api \
            --task-definition pricebasket-api \
            --force-new-deployment \
            --region ap-south-1

      - name: Wait for ECS service stability
        if: steps.check-aws.outputs.skip != 'true'
        run: |
          aws ecs wait services-stable \
            --cluster pricebasket-cluster \
            --services pricebasket-api \
            --region ap-south-1

      # Vercel automatically deploys on push to main branch via its GitHub integration.
      # No explicit Vercel deploy step needed — Vercel detects the push and
      # triggers a production deployment automatically.
