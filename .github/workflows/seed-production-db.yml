name: "Seed Production Database"

# One-shot workflow: SSHes into EC2, copies scraped_prices.json,
# and runs save_scraped_to_db.py directly against the production RDS.
#
# Run manually from GitHub Actions tab.

on:
  workflow_dispatch:

jobs:
  seed-db:
    name: "Seed DB via EC2 SSH"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy scraped data + seed script to EC2 and run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /opt/price-basket

            echo "📥 Pulling latest code (includes updated save_scraped_to_db.py)..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "🐍 Activating Python venv..."
            source backend/.venv/bin/activate

            echo "📦 Running seed script against production RDS..."
            python3 scripts/save_scraped_to_db.py \
              --file backend/app/data/scraped_prices.json \
              --env backend/.env

            echo "✅ Seed complete!"

            echo ""
            echo "🌟 Triggering load-scraped API endpoint to refresh cache..."
            SEED_KEY=$(grep SEED_SECRET backend/.env | cut -d= -f2 | tr -d ' \r\n')
            if [ -n "$SEED_KEY" ]; then
              curl -s -X POST "http://localhost:8000/api/v1/setup/load-scraped" \
                -H "x-seed-key: $SEED_KEY" \
                -H "Content-Type: application/json" | python3 -m json.tool || true
            else
              echo "⚠ SEED_SECRET not found in .env — skipping cache refresh"
            fi

            echo ""
            echo "🔄 Restarting API to clear in-memory cache..."
            pm2 restart pricebasket-api || true

            echo "🎉 All done! Check https://pricebasket.in"
