name: "Seed Production Database"

# Fully automated workflow:
# 1. Opens EC2 port 22 temporarily for the GitHub Actions runner IP
# 2. SSHes in to set SEED_SECRET in backend/.env and restart the API
# 3. Pushes scraped_prices.json to POST /api/v1/setup/import-prices in batches
# 4. Closes the temporary port 22 rule (cleanup always runs)
#
# Required GitHub Secrets:
#   EC2_HOST, EC2_USER, EC2_SSH_KEY  — EC2 SSH access
#   EC2_INSTANCE_SG                  — EC2 security group ID (sg-xxx)
#   AWS_ACCESS_KEY_ID                — AWS credentials for SG management
#   AWS_SECRET_ACCESS_KEY
#   SEED_SECRET                      — Secret key for the seed API endpoint

on:
  workflow_dispatch:

jobs:
  seed-db:
    name: "Seed Production DB"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # ── Step 1: Configure AWS CLI ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── Step 2: Get runner IP and open port 22 temporarily ─────────────────
      - name: Open EC2 port 22 for this runner
        id: open-ssh
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "🔓 Opening port 22 for runner IP: $RUNNER_IP"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_INSTANCE_SG }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --region ap-south-1 || echo "Rule may already exist, continuing..."
          echo "✅ Port 22 opened"

      # ── Step 3: SSH in to update SEED_SECRET in .env and restart API ───────
      - name: Update SEED_SECRET on server and restart API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            cd /opt/price-basket

            echo "🔑 Updating SEED_SECRET in backend/.env..."
            # Remove old SEED_SECRET line and add new one
            sed -i '/^SEED_SECRET=/d' backend/.env
            echo "SEED_SECRET=${{ secrets.SEED_SECRET }}" >> backend/.env
            echo "✅ SEED_SECRET updated"

            echo "🔄 Restarting API to pick up new SEED_SECRET..."
            pm2 restart pricebasket-api
            sleep 5
            echo "✅ API restarted"

            # Verify it's up
            curl -sf http://localhost:8000/health > /dev/null && echo "✅ API health check passed" || echo "⚠ API health check failed"

      # ── Step 4: Wait for API to be ready ───────────────────────────────────
      - name: Wait for API to be ready
        run: |
          echo "⏳ Waiting for API to be ready..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.pricebasket.in/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is ready (HTTP $STATUS)"
              break
            fi
            echo "   Attempt $i: HTTP $STATUS — waiting 5s..."
            sleep 5
          done

      # ── Step 5: Verify SEED_SECRET works ───────────────────────────────────
      - name: Verify seed key authentication
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.pricebasket.in/api/v1/setup/import-prices" \
            -H "x-seed-key: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"items":[]}')
          if [ "$STATUS" = "200" ]; then
            echo "✅ Seed key authentication works!"
          else
            echo "❌ Seed key auth failed: HTTP $STATUS"
            exit 1
          fi

      # ── Step 6: Push scraped data in batches ───────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install httpx

      - name: Push scraped data to production API
        env:
          SEED_SECRET: ${{ secrets.SEED_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time
          import httpx

          seed_key = os.environ["SEED_SECRET"]
          api_url  = "https://api.pricebasket.in/api/v1/setup/import-prices"
          data_file = "backend/app/data/scraped_prices.json"

          with open(data_file) as f:
              all_items = json.load(f)

          print(f"\n📦 Loaded {len(all_items)} items from {data_file}")
          by_platform = {}
          for item in all_items:
              p = item.get("platform", "unknown")
              by_platform[p] = by_platform.get(p, 0) + 1
          for p, c in sorted(by_platform.items()):
              print(f"   {p}: {c}")

          headers = {
              "x-seed-key": seed_key,
              "Content-Type": "application/json",
          }

          BATCH_SIZE = 100
          total_saved = 0
          total_skipped = 0
          batch_num = 0
          errors = 0

          print(f"\n🚀 Pushing to {api_url} in batches of {BATCH_SIZE}...")

          with httpx.Client(timeout=60.0) as client:
              for i in range(0, len(all_items), BATCH_SIZE):
                  batch = all_items[i : i + BATCH_SIZE]
                  batch_num += 1
                  payload = {"items": batch}

                  for attempt in range(3):
                      try:
                          resp = client.post(api_url, headers=headers, json=payload)
                          if resp.status_code == 200:
                              result = resp.json()
                              saved   = result.get("saved", 0)
                              skipped = result.get("skipped", 0)
                              total_saved   += saved
                              total_skipped += skipped
                              print(f"   Batch {batch_num:3d}: ✅ saved={saved} skipped={skipped}")
                              break
                          elif resp.status_code == 403:
                              print(f"   ❌ 403 Forbidden — wrong SEED_SECRET")
                              sys.exit(1)
                          elif resp.status_code == 422:
                              print(f"   ❌ 422 Validation error: {resp.text[:300]}")
                              errors += 1
                              break
                          else:
                              print(f"   ⚠️  Batch {batch_num}: HTTP {resp.status_code} (attempt {attempt+1}/3)")
                              time.sleep(2)
                      except Exception as e:
                          print(f"   ❌ Batch {batch_num} error (attempt {attempt+1}/3): {e}")
                          time.sleep(3)
                  else:
                      errors += 1

                  time.sleep(0.3)

          print(f"\n{'='*50}")
          print(f"✅ Done!")
          print(f"   Total saved:   {total_saved}")
          print(f"   Total skipped: {total_skipped}")
          print(f"   Batches:       {batch_num}")
          print(f"   Errors:        {errors}")
          print(f"\n🌐 Check https://pricebasket.in to see the live data!")

          if errors > 5:
              print(f"❌ Too many errors ({errors}), marking as failed")
              sys.exit(1)
          PYEOF

      # ── Step 7: Mark featured products and refresh cache ───────────────────
      - name: Mark featured products and refresh cache
        run: |
          echo "🌟 Triggering mark-featured endpoint..."
          RESP=$(curl -s -X POST "https://api.pricebasket.in/api/v1/setup/mark-featured" \
            -H "x-seed-key: ${{ secrets.SEED_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"limit": 200}')
          echo "mark-featured response: $RESP"

          echo ""
          echo "📊 Checking product count..."
          curl -s "https://api.pricebasket.in/api/v1/products/featured?limit=5" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list):
              print(f'✅ Featured products available: {len(data)} returned')
          else:
              print(f'Response: {data}')
          " || echo "⚠ Could not parse featured products response"

      # ── Cleanup: Always close port 22 ──────────────────────────────────────
      - name: Close EC2 port 22 (cleanup)
        if: always()
        run: |
          RUNNER_IP="${{ steps.open-ssh.outputs.runner_ip }}"
          if [ -z "$RUNNER_IP" ]; then
            RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          fi
          echo "🔒 Closing port 22 for runner IP: $RUNNER_IP"
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_INSTANCE_SG }} \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --region ap-south-1 || echo "Rule may not exist, continuing..."
          echo "✅ Port 22 closed"
