  <rect width="32" height="32" rx="7" fill="#ea580c"/>
  <!-- Shopping basket handle -->
  <path d="M10 11 Q10 8 16 8 Q22 8 22 11" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Basket body -->
  <rect x="8" y="11" width="16" height="12" rx="2" fill="white"/>
  <!-- Basket vertical lines -->
  <line x1="13" y1="11" x2="13" y2="23" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="19" y1="11" x2="19" y2="23" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Basket horizontal line -->
  <line x1="8" y1="17" x2="24" y2="17" stroke="#ea580c" stroke-width="1.5"/>
</svg>
