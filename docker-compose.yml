services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pricebasket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pricebasket_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    mem_limit: 4g
    env_file:
      - /opt/pricebasket/.env
    depends_on:
      - redis
      - postgres
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    mem_limit: 4g
    env_file:
      - /opt/pricebasket/.env
    depends_on:
      - redis
      - postgres

volumes:
  redis-data:
  postgres-data:
